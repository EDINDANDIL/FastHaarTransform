plugins {
    id 'java'
}

group = 'ru'
version = '1.0-SNAPSHOT'

repositories {
    mavenCentral()
}

dependencies {
    testImplementation platform('org.junit:junit-bom:5.10.0')
    testImplementation 'org.junit.jupiter:junit-jupiter'
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
}

test {
    useJUnitPlatform()
}

tasks.register('runSignalStructureExperiment', JavaExec) {
    group = 'experiments'
    description = 'Generates signal, Haar coefficients, and restored signal charts.'
    classpath = sourceSets.main.runtimeClasspath
    mainClass = 'ru.ht.util.SignalStructureExperiment'
}
